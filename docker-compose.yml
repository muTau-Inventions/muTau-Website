services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: mutau
      POSTGRES_PASSWORD: strongpassword123
      POSTGRES_DB: mutau
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mutau -d mutau"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "80:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mutau:strongpassword123@db:5432/mutau
      SECRET_KEY: fdhfhjjhkfrhjknfdjhknfdsjhknfdsjhkfdsjhkfdshjknfdsjhkdfsjhkdfsjhkfdsjhk
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static
      - ./docs:/app/docs
      - ./research:/app/research
      - ./config.yml:/app/config.yml:ro

volumes:
  postgres_data: