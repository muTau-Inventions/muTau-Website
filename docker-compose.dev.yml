# Development compose file.

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: mutau
      POSTGRES_PASSWORD: strongpassword123
      POSTGRES_DB: mutau
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mutau -d mutau"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    ports:
      - "80:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mutau:strongpassword123@db:5432/mutau
      SECRET_KEY: pi ist ungefähr 3.14159265358...
      ADMIN_EMAIL: admin@erikdonath.de
      ADMIN_NAME: Admin Admin
      ADMIN_PASSWORD: admin
    volumes:
      # Source mounts
      - ./templates:/app/templates
      - ./static:/app/static
      # Runtime content
      - ./docs:/app/docs
      - ./research:/app/research
      - ./config.yml:/app/config.yml:ro

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@erikdonath.de
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  postgres-data:
  pgadmin-data: