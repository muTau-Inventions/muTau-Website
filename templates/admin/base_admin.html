{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}
<div class="container">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h4>Admin</h4>
            <ul>
                <li><a href="{{ url_for('admin.dashboard') }}"
                       {% if request.endpoint == 'admin.dashboard' %}class="active"{% endif %}>Dashboard</a></li>
                <li><a href="{{ url_for('admin.products') }}"
                       {% if request.endpoint in ('admin.products', 'admin.edit_product') %}class="active"{% endif %}>Produkte</a></li>
                <li><a href="{{ url_for('admin.papers') }}"
                       {% if request.endpoint in ('admin.papers', 'admin.new_paper', 'admin.edit_paper') %}class="active"{% endif %}>Forschung</a></li>
                <li><a href="{{ url_for('admin.offers') }}"
                       {% if request.endpoint in ('admin.offers', 'admin.offer_detail') %}class="active"{% endif %}>Anfragen</a></li>
                <li><a href="{{ url_for('admin.contact_messages') }}"
                       {% if request.endpoint == 'admin.contact_messages' %}class="active"{% endif %}>Nachrichten</a></li>
                <li><a href="{{ url_for('admin.users') }}"
                       {% if request.endpoint == 'admin.users' %}class="active"{% endif %}>Nutzer</a></li>
            </ul>
        </aside>
        <div class="admin-content">
            {% block admin_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
