{% extends "base.html" %}
{% block title %}Passwort zurücksetzen{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-box">
        <h2>Passwort zurücksetzen</h2>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 2rem;">
            Geben Sie Ihre Email-Adresse ein und wir senden Ihnen einen Link zum Zurücksetzen Ihres Passworts.
        </p>
        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="ihre.email@example.com">
            </div>
            <button type="submit" class="btn" style="width: 100%;">Link senden</button>
            <p style="text-align: center; margin-top: 1.5rem; color: #94a3b8;">
                <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none;">← Zurück zum Login</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
