<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Inter, system-ui, sans-serif; background:#0a0f1e; color:#f1f5f9; margin:0; padding:0; }
    .wrap { max-width:560px; margin:40px auto; background:#0f172a; border-radius:12px;
            border:1px solid rgba(255,255,255,0.08); overflow:hidden; }
    .head { background:linear-gradient(135deg,#667eea,#764ba2); padding:28px 36px; }
    .head h1 { margin:0; font-size:1.1rem; color:#fff; letter-spacing:-0.02em; }
    .body { padding:32px 36px; }
    .body h2 { color:#f1f5f9; font-size:1rem; margin-top:0; }
    .body h3 { color:#a5b4fc; font-size:0.95rem; }
    .body p  { color:#94a3b8; font-size:0.88rem; line-height:1.8; }
    .btn { display:inline-block; padding:12px 28px; background:linear-gradient(135deg,#667eea,#764ba2);
           color:#fff; text-decoration:none; border-radius:50px; font-size:0.85rem;
           font-weight:600; margin:16px 0; }
    .foot { padding:20px 36px; border-top:1px solid rgba(255,255,255,0.06);
            color:#556070; font-size:0.75rem; }
    hr { border:none; border-top:1px solid rgba(255,255,255,0.06); margin:24px 0; }
    a.muted { color:#6366f1; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="head"><h1>muTau-Inventions</h1></div>
  <div class="body">{% block body %}{% endblock %}</div>
  <div class="foot">&copy; 2026 muTau-Inventions GmbH &mdash; {% block footer_label %}{% endblock %}</div>
</div>
</body>
</html>
