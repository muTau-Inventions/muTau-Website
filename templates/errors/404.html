{% extends "base.html" %}
{% block title %}404 Not Found{% endblock %}
{% block content %}
<div class="container">
    <div class="error-page">
        <div class="error-code">404</div>
        <h2 style="font-family:var(--font-display);color:var(--text)">Seite nicht gefunden</h2>
        <p>Die gesuchte Seite existiert nicht oder wurde verschoben.</p>
        <a href="{{ url_for('main.index') }}" class="btn">Zurück zur Startseite</a>
    </div>
</div>
{% endblock %}
