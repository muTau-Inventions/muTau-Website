{% extends "base.html" %}
{% block title %}Registrieren{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-box">
        <h2>Registrieren</h2>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label>Vorname</label>
                <input type="text" name="first_name" required placeholder="Max">
            </div>
            <div class="form-group">
                <label>Nachname</label>
                <input type="text" name="last_name" required placeholder="Mustermann">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="max@example.com">
            </div>
            <div class="form-group">
                <label>Passwort</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Passwort bestätigen</label>
                <input type="password" name="confirm_password" required placeholder="••••••••">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: flex; align-items: center; color: #94a3b8; cursor: pointer;">
                    <input type="checkbox" name="agb" required style="margin-right: 0.5rem;">
                    Ich akzeptiere die <a href="{{ url_for('agb') }}" style="color: var(--primary); text-decoration: none; margin-left: 0.3rem;">AGB</a> und <a href="{{ url_for('datenschutz') }}" style="color: var(--primary); text-decoration: none; margin-left: 0.3rem;">Datenschutzerklärung</a>
                </label>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Account erstellen</button>
            <p style="text-align: center; margin-top: 1.5rem; color: #94a3b8;">
                Schon registriert? <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none;">Anmelden</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
