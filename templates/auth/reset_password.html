{% extends "base.html" %}
{% block title %}Neues Passwort setzen{% endblock %}
{% block content %}

<div class="auth-container">
    <div class="auth-box">
        <h2>Neues Passwort</h2>
        <p style="text-align:center;color:var(--text-soft);font-size:0.82rem;margin-bottom:1.75rem;line-height:1.6">
            Wähle ein neues Passwort für deinen Account.
        </p>
        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Neues Passwort <span style="color:var(--text-muted);font-size:0.72rem">(min. 8 Zeichen)</span></label>
                <input type="password" name="password" required placeholder="*******" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>Passwort bestätigen</label>
                <input type="password" name="confirm_password" required placeholder="*******" autocomplete="new-password">
            </div>
            <button type="submit" class="btn" style="width:100%">Passwort speichern</button>
        </form>
        <p class="auth-footer">
            <a href="{{ url_for('auth.login') }}">&larr; Zurück zum Login</a>
        </p>
    </div>
</div>

{% endblock %}
