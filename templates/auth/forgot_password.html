{% extends "base.html" %}
{% block title %}Passwort zurücksetzen{% endblock %}
{% block content %}

<div class="auth-container">
    <div class="auth-box">
        <h2>Passwort zurücksetzen</h2>
        <p style="text-align:center;color:var(--text-soft);font-size:0.82rem;margin-bottom:1.75rem;line-height:1.6">
            Gib deine E-Mail-Adresse ein. Falls ein Account existiert, senden wir dir einen Reset-Link.
        </p>
        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
            <div class="form-group">
                <label>E-Mail</label>
                <input type="email" name="email" required placeholder="you@example.com" autocomplete="email">
            </div>
            <button type="submit" class="btn" style="width:100%">Reset-Link senden</button>
        </form>
        <p class="auth-footer">
            <a href="{{ url_for('auth.login') }}">← Zurück zum Login</a>
        </p>
    </div>
</div>

{% endblock %}
