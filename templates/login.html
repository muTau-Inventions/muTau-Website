{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-box">
        <h2>Login</h2>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>Benutzername oder Email</label>
                <input type="text" name="email" required placeholder="username@example.com">
            </div>
            <div class="form-group">
                <label>Passwort</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <label style="display: flex; align-items: center; color: #94a3b8; cursor: pointer;">
                    <input type="checkbox" name="remember" style="margin-right: 0.5rem;">
                    Angemeldet bleiben
                </label>
                <a href="{{ url_for('forgot_password') }}" style="color: var(--primary); text-decoration: none;">Passwort vergessen?</a>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Anmelden</button>
            <p style="text-align: center; margin-top: 1.5rem; color: #94a3b8;">
                Noch kein Account? <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none;">Registrieren</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
